version: 2

models:
  - name: stg_stock_prices
    description: "Modelo staging limpio de precios diarios de acciones bancarias."
    columns:
      - name: ticker
        description: "Símbolo bursátil del banco."
        tests:
          - not_null

      - name: date
        description: "Fecha de cotización."
        tests:
          - not_null

      - name: close
        description: "Precio de cierre."
        tests:
          - not_null

      - name: volume
        description: "Volumen transado."
        tests:
          - not_null