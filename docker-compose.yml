services:

  postgres:
    image: postgres:15
    container_name: postgres_landing
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - data_network

  clickhouse:
    image: clickhouse/clickhouse-server:23
    container_name: clickhouse_dwh
    restart: always
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "${CLICKHOUSE_PORT}:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - data_network

  ingestion:
    build:
      context: .
      dockerfile: ingestion_service/Dockerfile
    container_name: ingestion_service
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - data_network

  dbt:
    build:
      context: ./dbt_clickhouse
    container_name: dbt_clickhouse
    env_file:
      - .env
    volumes:
      - ./dbt_clickhouse:/usr/app
    working_dir: /usr/app
    command: tail -f /dev/null
    ports:
      - "8080:8080"
    networks:
      - data_network
    depends_on:
      - clickhouse

  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    restart: always
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__WEBSERVER__SECRET_KEY=supersecretkey
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - airflow_data:/opt/airflow
    ports:
      - "8081:8080"
    networks:
      - data_network
    depends_on:
      - postgres
    command: standalone

networks:
  data_network:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  airflow_data: